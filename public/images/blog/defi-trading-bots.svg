<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#12112b"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <radialGradient id="brain" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#6d28d9"/>
    </radialGradient>
    <radialGradient id="block" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </radialGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Chart grid -->
  <g opacity="0.2" stroke="#3b82f6" stroke-width="1">
    <line x1="100" y1="500" x2="1100" y2="500"/>
    <line x1="100" y1="400" x2="1100" y2="400"/>
    <line x1="100" y1="300" x2="1100" y2="300"/>
    <line x1="100" y1="200" x2="1100" y2="200"/>
  </g>
  
  <!-- Candlestick chart -->
  <g stroke-width="2">
    <rect x="150" y="350" width="20" height="100" fill="#10b981"/>
    <line x1="160" y1="330" x2="160" y2="480" stroke="#10b981"/>
    <rect x="200" y="400" width="20" height="50" fill="#ef4444"/>
    <line x1="210" y1="390" x2="210" y2="470" stroke="#ef4444"/>
    <rect x="250" y="280" width="20" height="120" fill="#10b981"/>
    <line x1="260" y1="260" x2="260" y2="420" stroke="#10b981"/>
    <rect x="300" y="320" width="20" height="60" fill="#ef4444"/>
    <line x1="310" y1="310" x2="310" y2="400" stroke="#ef4444"/>
    <rect x="350" y="200" width="20" height="140" fill="#10b981"/>
    <line x1="360" y1="180" x2="360" y2="360" stroke="#10b981"/>
  </g>
  
  <!-- AI Bot Brain -->
  <circle cx="600" cy="315" r="70" fill="url(#brain)"/>
  <circle cx="600" cy="315" r="50" fill="none" stroke="#a78bfa" stroke-width="2" opacity="0.7"/>
  
  <!-- Neural network -->
  <g transform="translate(600,315)" fill="#fff" opacity="0.9">
    <circle cx="-25" cy="-15" r="4"/>
    <circle cx="-25" cy="0" r="4"/>
    <circle cx="-25" cy="15" r="4"/>
    <circle cx="0" cy="-10" r="5"/>
    <circle cx="0" cy="10" r="5"/>
    <circle cx="25" cy="0" r="4"/>
    <g stroke="#fff" stroke-width="1" fill="none" opacity="0.6">
      <line x1="-25" y1="-15" x2="0" y2="-10"/>
      <line x1="-25" y1="0" x2="0" y2="-10"/>
      <line x1="-25" y1="15" x2="0" y2="10"/>
      <line x1="0" y1="-10" x2="25" y2="0"/>
      <line x1="0" y1="10" x2="25" y2="0"/>
    </g>
  </g>
  
  <!-- Blockchain nodes -->
  <circle cx="200" cy="150" r="30" fill="url(#block)"/>
  <circle cx="1000" cy="150" r="30" fill="url(#block)"/>
  <circle cx="200" cy="480" r="30" fill="url(#block)"/>
  <circle cx="1000" cy="480" r="30" fill="url(#block)"/>
  
  <!-- Block symbols -->
  <g fill="#fff" opacity="0.9">
    <rect x="190" y="140" width="20" height="20" rx="3"/>
    <rect x="990" y="140" width="20" height="20" rx="3"/>
    <rect x="190" y="470" width="20" height="20" rx="3"/>
    <rect x="990" y="470" width="20" height="20" rx="3"/>
  </g>
  
  <!-- Trading bots -->
  <circle cx="450" cy="200" r="20" fill="#3b82f6"/>
  <circle cx="750" cy="200" r="20" fill="#3b82f6"/>
  <circle cx="450" cy="430" r="20" fill="#3b82f6"/>
  <circle cx="750" cy="430" r="20" fill="#3b82f6"/>
  
  <!-- Bot symbols -->
  <g fill="#fff" opacity="0.9">
    <rect x="445" y="195" width="10" height="10" rx="2"/>
    <rect x="745" y="195" width="10" height="10" rx="2"/>
    <rect x="445" y="425" width="10" height="10" rx="2"/>
    <rect x="745" y="425" width="10" height="10" rx="2"/>
  </g>
  
  <!-- Connections -->
  <g stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.7">
    <line x1="600" y1="315" x2="450" y2="200"/>
    <line x1="600" y1="315" x2="750" y2="200"/>
    <line x1="600" y1="315" x2="450" y2="430"/>
    <line x1="600" y1="315" x2="750" y2="430"/>
    <line x1="450" y1="200" x2="200" y2="150"/>
    <line x1="750" y1="200" x2="1000" y2="150"/>
    <line x1="450" y1="430" x2="200" y2="480"/>
    <line x1="750" y1="430" x2="1000" y2="480"/>
  </g>
  
  <!-- Trend line -->
  <path d="M 150 450 Q 450 350 750 280 Q 900 260 1050 220" 
        stroke="#10b981" stroke-width="3" fill="none" opacity="0.8"/>
  
  <!-- Data particles -->
  <g fill="#06b6d4" opacity="0.8">
    <circle cx="300" cy="250" r="2"/>
    <circle cx="500" cy="300" r="3"/>
    <circle cx="700" cy="280" r="2"/>
    <circle cx="900" cy="320" r="3"/>
  </g>
  
  <!-- Price indicators -->
  <g fill="#34d399" font-family="Arial" font-size="14" opacity="0.9">
    <text x="850" y="180">+12.5%</text>
    <text x="850" y="450">+8.7%</text>
  </g>
  
  <!-- Volume bars -->
  <g opacity="0.4" fill="#06b6d4">
    <rect x="150" y="550" width="15" height="30"/>
    <rect x="200" y="540" width="15" height="40"/>
    <rect x="250" y="530" width="15" height="50"/>
    <rect x="300" y="545" width="15" height="35"/>
    <rect x="350" y="525" width="15" height="55"/>
  </g>
</svg>