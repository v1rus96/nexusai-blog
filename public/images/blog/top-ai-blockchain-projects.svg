<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="tap-glow1" cx="35%" cy="45%" r="40%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.18" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="tap-glow2" cx="65%" cy="55%" r="40%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="tap-glow3" cx="50%" cy="50%" r="25%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.12" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <filter id="tap-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="tap-grad1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#8B5CF6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="tap-grad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#3B82F6" stop-opacity="0.1" />
    </linearGradient>
    <linearGradient id="tap-grad3" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.25" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.1" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0A0A0F" />
  <rect width="1200" height="630" fill="url(#tap-glow1)" />
  <rect width="1200" height="630" fill="url(#tap-glow2)" />
  <rect width="1200" height="630" fill="url(#tap-glow3)" />

  <!-- Faint grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="60" y1="0" x2="60" y2="630" />
    <line x1="120" y1="0" x2="120" y2="630" /><line x1="180" y1="0" x2="180" y2="630" />
    <line x1="240" y1="0" x2="240" y2="630" /><line x1="300" y1="0" x2="300" y2="630" />
    <line x1="360" y1="0" x2="360" y2="630" /><line x1="420" y1="0" x2="420" y2="630" />
    <line x1="480" y1="0" x2="480" y2="630" /><line x1="540" y1="0" x2="540" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" /><line x1="660" y1="0" x2="660" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" /><line x1="780" y1="0" x2="780" y2="630" />
    <line x1="840" y1="0" x2="840" y2="630" /><line x1="900" y1="0" x2="900" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" /><line x1="1020" y1="0" x2="1020" y2="630" />
    <line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1140" y1="0" x2="1140" y2="630" />
    <line x1="0" y1="63" x2="1200" y2="63" /><line x1="0" y1="126" x2="1200" y2="126" />
    <line x1="0" y1="189" x2="1200" y2="189" /><line x1="0" y1="252" x2="1200" y2="252" />
    <line x1="0" y1="315" x2="1200" y2="315" /><line x1="0" y1="378" x2="1200" y2="378" />
    <line x1="0" y1="441" x2="1200" y2="441" /><line x1="0" y1="504" x2="1200" y2="504" />
    <line x1="0" y1="567" x2="1200" y2="567" />
  </g>

  <!-- Mosaic grid of abstract shapes -->
  <g filter="url(#tap-blur)">
    <!-- Row 1 -->
    <rect x="200" y="80" width="120" height="120" rx="8" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.6" />
    <rect x="210" y="90" width="40" height="40" rx="4" fill="url(#tap-grad1)" />
    <polygon points="340,80 460,80 460,200 340,200 400,140" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5" />
    <rect x="340" y="80" width="120" height="120" rx="8" fill="url(#tap-grad3)" opacity="0.15" />
    <rect x="480" y="80" width="100" height="120" rx="8" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.5" />
    <circle cx="530" cy="140" r="30" fill="url(#tap-grad2)" opacity="0.3" />
    <rect x="600" y="80" width="140" height="120" rx="8" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.4" />
    <polygon points="620,100 720,100 670,180" fill="#3B82F6" opacity="0.15" />
    <rect x="760" y="80" width="100" height="120" rx="8" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5" />
    <rect x="775" y="95" width="70" height="90" rx="4" fill="url(#tap-grad1)" opacity="0.2" />
    <rect x="880" y="80" width="120" height="120" rx="8" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.4" />

    <!-- Row 2 -->
    <rect x="160" y="220" width="140" height="100" rx="8" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.5" />
    <circle cx="230" cy="270" r="25" fill="#06B6D4" opacity="0.12" />
    <rect x="320" y="220" width="130" height="100" rx="8" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.6" />
    <polygon points="350,240 420,240 385,300" fill="#8B5CF6" opacity="0.15" />
    <rect x="470" y="220" width="110" height="100" rx="8" fill="url(#tap-grad2)" opacity="0.12" />
    <rect x="470" y="220" width="110" height="100" rx="8" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5" />
    <rect x="600" y="220" width="160" height="100" rx="8" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.45" />
    <rect x="615" y="235" width="50" height="70" rx="4" fill="#06B6D4" opacity="0.1" />
    <rect x="695" y="235" width="50" height="70" rx="4" fill="#3B82F6" opacity="0.1" />
    <rect x="780" y="220" width="120" height="100" rx="8" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.5" />
    <circle cx="840" cy="270" r="28" fill="url(#tap-grad1)" opacity="0.2" />
    <rect x="920" y="220" width="100" height="100" rx="8" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.4" />

    <!-- Row 3 -->
    <rect x="200" y="340" width="100" height="130" rx="8" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5" />
    <polygon points="220,360 280,360 250,450" fill="#8B5CF6" opacity="0.12" />
    <rect x="320" y="340" width="160" height="130" rx="8" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.45" />
    <rect x="335" y="355" width="130" height="100" rx="4" fill="url(#tap-grad3)" opacity="0.1" />
    <rect x="500" y="340" width="120" height="130" rx="8" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.55" />
    <circle cx="560" cy="405" r="35" fill="#06B6D4" opacity="0.1" />
    <rect x="640" y="340" width="110" height="130" rx="8" fill="none" stroke="#8B5CF6" stroke-width="1.5" opacity="0.5" />
    <rect x="655" y="355" width="80" height="45" rx="4" fill="url(#tap-grad1)" opacity="0.15" />
    <rect x="770" y="340" width="130" height="130" rx="8" fill="none" stroke="#3B82F6" stroke-width="1.5" opacity="0.4" />
    <polygon points="790,360 880,360 835,450" fill="#3B82F6" opacity="0.1" />
    <rect x="920" y="340" width="100" height="130" rx="8" fill="none" stroke="#06B6D4" stroke-width="1.5" opacity="0.45" />
  </g>

  <!-- Connector lines between grid cells -->
  <g stroke="rgba(255,255,255,0.06)" stroke-width="0.5" stroke-dasharray="4 4">
    <line x1="320" y1="140" x2="340" y2="140" />
    <line x1="580" y1="140" x2="600" y2="140" />
    <line x1="300" y1="270" x2="320" y2="270" />
    <line x1="580" y1="270" x2="600" y2="270" />
    <line x1="620" y1="200" x2="620" y2="220" />
    <line x1="400" y1="200" x2="400" y2="220" />
  </g>

  <!-- Decorative particles -->
  <g fill="#06B6D4" opacity="0.12">
    <circle cx="130" cy="150" r="2" />
    <circle cx="1060" cy="300" r="2" />
    <circle cx="150" cy="480" r="1.5" />
    <circle cx="1080" cy="450" r="1.5" />
    <circle cx="600" cy="560" r="1" />
    <circle cx="500" cy="50" r="1" />
  </g>
</svg>