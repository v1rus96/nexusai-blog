<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a3e" />
      <stop offset="100%" stop-color="#0a0a1a" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-wide" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="14" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad-blue-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="grad-cyan-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-glow)" />

  <!-- Inter-agent connection lines (drawn first, behind nodes) -->
  <g stroke="url(#grad-blue-violet)" stroke-width="1.5" opacity="0.25" fill="none">
    <!-- Center to all -->
    <line x1="600" y1="300" x2="300" y2="180" />
    <line x1="600" y1="300" x2="900" y2="180" />
    <line x1="600" y1="300" x2="200" y2="420" />
    <line x1="600" y1="300" x2="1000" y2="420" />
    <line x1="600" y1="300" x2="450" y2="520" />
    <line x1="600" y1="300" x2="750" y2="520" />
    <!-- Peer connections -->
    <line x1="300" y1="180" x2="200" y2="420" />
    <line x1="900" y1="180" x2="1000" y2="420" />
    <line x1="300" y1="180" x2="900" y2="180" />
    <line x1="200" y1="420" x2="450" y2="520" />
    <line x1="1000" y1="420" x2="750" y2="520" />
    <line x1="450" y1="520" x2="750" y2="520" />
  </g>

  <!-- Data flow particles on connections -->
  <g fill="#06B6D4" opacity="0.5">
    <circle cx="450" cy="240" r="3"><animate attributeName="cx" values="600;300" dur="3s" repeatCount="indefinite"/><animate attributeName="cy" values="300;180" dur="3s" repeatCount="indefinite"/></circle>
    <circle cx="750" cy="240" r="3"><animate attributeName="cx" values="600;900" dur="4s" repeatCount="indefinite"/><animate attributeName="cy" values="300;180" dur="4s" repeatCount="indefinite"/></circle>
    <circle cx="525" cy="410" r="2.5"><animate attributeName="cx" values="600;450" dur="3.5s" repeatCount="indefinite"/><animate attributeName="cy" values="300;520" dur="3.5s" repeatCount="indefinite"/></circle>
  </g>

  <!-- Central orchestrator agent -->
  <g filter="url(#glow-wide)">
    <circle cx="600" cy="300" r="45" fill="none" stroke="#A855F7" stroke-width="2.5" opacity="0.9" />
    <circle cx="600" cy="300" r="45" fill="#A855F7" opacity="0.05" />
    <circle cx="600" cy="300" r="30" fill="none" stroke="#A855F7" stroke-width="1" opacity="0.4" />
    <text x="600" y="296" text-anchor="middle" fill="#A855F7" font-family="monospace" font-size="11" font-weight="bold">ORCH</text>
    <text x="600" y="312" text-anchor="middle" fill="#A855F7" font-family="monospace" font-size="9" opacity="0.6">agent</text>
  </g>

  <!-- Agent 1: Researcher (top-left) -->
  <g filter="url(#glow)">
    <circle cx="300" cy="180" r="35" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.8" />
    <circle cx="300" cy="180" r="35" fill="#3B82F6" opacity="0.04" />
    <text x="300" y="176" text-anchor="middle" fill="#3B82F6" font-family="monospace" font-size="10" font-weight="bold">RESEARCH</text>
    <text x="300" y="192" text-anchor="middle" fill="#3B82F6" font-family="monospace" font-size="9" opacity="0.6">agent</text>
  </g>

  <!-- Agent 2: Coder (top-right) -->
  <g filter="url(#glow)">
    <circle cx="900" cy="180" r="35" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.8" />
    <circle cx="900" cy="180" r="35" fill="#06B6D4" opacity="0.04" />
    <text x="900" y="176" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="10" font-weight="bold">CODER</text>
    <text x="900" y="192" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="9" opacity="0.6">agent</text>
  </g>

  <!-- Agent 3: Analyst (left) -->
  <g filter="url(#glow)">
    <circle cx="200" cy="420" r="32" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.8" />
    <circle cx="200" cy="420" r="32" fill="#8B5CF6" opacity="0.04" />
    <text x="200" y="416" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="10" font-weight="bold">ANALYST</text>
    <text x="200" y="432" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="9" opacity="0.6">agent</text>
  </g>

  <!-- Agent 4: Executor (right) -->
  <g filter="url(#glow)">
    <circle cx="1000" cy="420" r="32" fill="none" stroke="#3B82F6" stroke-width="2" opacity="0.8" />
    <circle cx="1000" cy="420" r="32" fill="#3B82F6" opacity="0.04" />
    <text x="1000" y="416" text-anchor="middle" fill="#3B82F6" font-family="monospace" font-size="10" font-weight="bold">EXECUTOR</text>
    <text x="1000" y="432" text-anchor="middle" fill="#3B82F6" font-family="monospace" font-size="9" opacity="0.6">agent</text>
  </g>

  <!-- Agent 5: Writer (bottom-left) -->
  <g filter="url(#glow)">
    <circle cx="450" cy="520" r="30" fill="none" stroke="#06B6D4" stroke-width="2" opacity="0.7" />
    <circle cx="450" cy="520" r="30" fill="#06B6D4" opacity="0.04" />
    <text x="450" y="516" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="10" font-weight="bold">WRITER</text>
    <text x="450" y="532" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="9" opacity="0.6">agent</text>
  </g>

  <!-- Agent 6: Reviewer (bottom-right) -->
  <g filter="url(#glow)">
    <circle cx="750" cy="520" r="30" fill="none" stroke="#8B5CF6" stroke-width="2" opacity="0.7" />
    <circle cx="750" cy="520" r="30" fill="#8B5CF6" opacity="0.04" />
    <text x="750" y="516" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="10" font-weight="bold">REVIEWER</text>
    <text x="750" y="532" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="9" opacity="0.6">agent</text>
  </g>

  <!-- Outer swarm ring -->
  <circle cx="600" cy="330" r="280" fill="none" stroke="#8B5CF6" stroke-width="0.5" opacity="0.08" stroke-dasharray="8 4" />
  <circle cx="600" cy="330" r="240" fill="none" stroke="#3B82F6" stroke-width="0.5" opacity="0.06" stroke-dasharray="6 3" />

  <!-- Message bubbles floating -->
  <g opacity="0.15" filter="url(#glow)">
    <rect x="380" y="120" width="60" height="25" rx="12" fill="none" stroke="#06B6D4" stroke-width="1" />
    <text x="410" y="137" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="8">msg</text>
    <rect x="760" y="350" width="60" height="25" rx="12" fill="none" stroke="#8B5CF6" stroke-width="1" />
    <text x="790" y="367" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="8">task</text>
  </g>

  <!-- Floating particles -->
  <g fill="#06B6D4" opacity="0.2">
    <circle cx="100" cy="100" r="2" /><circle cx="1100" cy="100" r="2.5" />
    <circle cx="80" cy="550" r="1.5" /><circle cx="1120" cy="550" r="2" />
    <circle cx="600" cy="60" r="2" /><circle cx="150" cy="300" r="1.5" />
    <circle cx="1050" cy="300" r="2" />
  </g>

  <!-- Circuit traces -->
  <g opacity="0.06" stroke="#3B82F6" stroke-width="1" fill="none">
    <path d="M0 80 L50 80 L50 40 L120 40" />
    <path d="M1080 590 L1140 590 L1140 560 L1200 560" />
  </g>
</svg>
