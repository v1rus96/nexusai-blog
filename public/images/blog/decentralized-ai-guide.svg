<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="dag-glow1" cx="50%" cy="50%" r="45%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.2" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="dag-glow2" cx="30%" cy="40%" r="35%">
      <stop offset="0%" stop-color="#8B5CF6" stop-opacity="0.15" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <radialGradient id="dag-glow3" cx="70%" cy="60%" r="35%">
      <stop offset="0%" stop-color="#06B6D4" stop-opacity="0.15" />
      <stop offset="100%" stop-color="transparent" />
    </radialGradient>
    <filter id="dag-blur" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="dag-line-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="#0A0A0F" />
  <rect width="1200" height="630" fill="url(#dag-glow1)" />
  <rect width="1200" height="630" fill="url(#dag-glow2)" />
  <rect width="1200" height="630" fill="url(#dag-glow3)" />

  <!-- Faint grid -->
  <g stroke="rgba(255,255,255,0.03)" stroke-width="0.5">
    <line x1="0" y1="0" x2="0" y2="630" /><line x1="60" y1="0" x2="60" y2="630" />
    <line x1="120" y1="0" x2="120" y2="630" /><line x1="180" y1="0" x2="180" y2="630" />
    <line x1="240" y1="0" x2="240" y2="630" /><line x1="300" y1="0" x2="300" y2="630" />
    <line x1="360" y1="0" x2="360" y2="630" /><line x1="420" y1="0" x2="420" y2="630" />
    <line x1="480" y1="0" x2="480" y2="630" /><line x1="540" y1="0" x2="540" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" /><line x1="660" y1="0" x2="660" y2="630" />
    <line x1="720" y1="0" x2="720" y2="630" /><line x1="780" y1="0" x2="780" y2="630" />
    <line x1="840" y1="0" x2="840" y2="630" /><line x1="900" y1="0" x2="900" y2="630" />
    <line x1="960" y1="0" x2="960" y2="630" /><line x1="1020" y1="0" x2="1020" y2="630" />
    <line x1="1080" y1="0" x2="1080" y2="630" /><line x1="1140" y1="0" x2="1140" y2="630" />
    <line x1="0" y1="63" x2="1200" y2="63" /><line x1="0" y1="126" x2="1200" y2="126" />
    <line x1="0" y1="189" x2="1200" y2="189" /><line x1="0" y1="252" x2="1200" y2="252" />
    <line x1="0" y1="315" x2="1200" y2="315" /><line x1="0" y1="378" x2="1200" y2="378" />
    <line x1="0" y1="441" x2="1200" y2="441" /><line x1="0" y1="504" x2="1200" y2="504" />
    <line x1="0" y1="567" x2="1200" y2="567" />
  </g>

  <!-- Network connections radiating from center -->
  <g stroke="url(#dag-line-grad)" stroke-width="1.5" opacity="0.5">
    <!-- Center to ring 1 -->
    <line x1="600" y1="315" x2="450" y2="200" />
    <line x1="600" y1="315" x2="750" y2="200" />
    <line x1="600" y1="315" x2="450" y2="430" />
    <line x1="600" y1="315" x2="750" y2="430" />
    <line x1="600" y1="315" x2="380" y2="315" />
    <line x1="600" y1="315" x2="820" y2="315" />
    <!-- Ring 1 to ring 2 -->
    <line x1="450" y1="200" x2="300" y2="130" />
    <line x1="450" y1="200" x2="350" y2="280" />
    <line x1="750" y1="200" x2="900" y2="130" />
    <line x1="750" y1="200" x2="850" y2="280" />
    <line x1="450" y1="430" x2="300" y2="500" />
    <line x1="450" y1="430" x2="350" y2="360" />
    <line x1="750" y1="430" x2="900" y2="500" />
    <line x1="750" y1="430" x2="850" y2="360" />
    <line x1="380" y1="315" x2="230" y2="220" />
    <line x1="380" y1="315" x2="230" y2="410" />
    <line x1="820" y1="315" x2="970" y2="220" />
    <line x1="820" y1="315" x2="970" y2="410" />
    <!-- Cross connections ring 2 -->
    <line x1="300" y1="130" x2="230" y2="220" opacity="0.3" />
    <line x1="900" y1="130" x2="970" y2="220" opacity="0.3" />
    <line x1="300" y1="500" x2="230" y2="410" opacity="0.3" />
    <line x1="900" y1="500" x2="970" y2="410" opacity="0.3" />
    <!-- Outer connections -->
    <line x1="300" y1="130" x2="150" y2="80" opacity="0.2" />
    <line x1="900" y1="130" x2="1050" y2="80" opacity="0.2" />
    <line x1="300" y1="500" x2="150" y2="550" opacity="0.2" />
    <line x1="900" y1="500" x2="1050" y2="550" opacity="0.2" />
    <line x1="230" y1="220" x2="100" y2="180" opacity="0.2" />
    <line x1="970" y1="220" x2="1100" y2="180" opacity="0.2" />
    <line x1="230" y1="410" x2="100" y2="450" opacity="0.2" />
    <line x1="970" y1="410" x2="1100" y2="450" opacity="0.2" />
  </g>

  <!-- Center node (large) -->
  <circle cx="600" cy="315" r="22" fill="#0A0A0F" stroke="#06B6D4" stroke-width="2.5" filter="url(#dag-blur)" />
  <circle cx="600" cy="315" r="10" fill="#06B6D4" opacity="0.6" />

  <!-- Ring 1 nodes -->
  <g filter="url(#dag-blur)">
    <circle cx="450" cy="200" r="14" fill="#0A0A0F" stroke="#3B82F6" stroke-width="2" />
    <circle cx="450" cy="200" r="6" fill="#3B82F6" opacity="0.5" />
    <circle cx="750" cy="200" r="14" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="750" cy="200" r="6" fill="#8B5CF6" opacity="0.5" />
    <circle cx="450" cy="430" r="14" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="450" cy="430" r="6" fill="#8B5CF6" opacity="0.5" />
    <circle cx="750" cy="430" r="14" fill="#0A0A0F" stroke="#3B82F6" stroke-width="2" />
    <circle cx="750" cy="430" r="6" fill="#3B82F6" opacity="0.5" />
    <circle cx="380" cy="315" r="14" fill="#0A0A0F" stroke="#06B6D4" stroke-width="2" />
    <circle cx="380" cy="315" r="6" fill="#06B6D4" opacity="0.5" />
    <circle cx="820" cy="315" r="14" fill="#0A0A0F" stroke="#06B6D4" stroke-width="2" />
    <circle cx="820" cy="315" r="6" fill="#06B6D4" opacity="0.5" />
  </g>

  <!-- Ring 2 nodes -->
  <g filter="url(#dag-blur)">
    <circle cx="300" cy="130" r="10" fill="#0A0A0F" stroke="#3B82F6" stroke-width="1.5" />
    <circle cx="300" cy="130" r="4" fill="#3B82F6" opacity="0.4" />
    <circle cx="900" cy="130" r="10" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="1.5" />
    <circle cx="900" cy="130" r="4" fill="#8B5CF6" opacity="0.4" />
    <circle cx="300" cy="500" r="10" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="1.5" />
    <circle cx="300" cy="500" r="4" fill="#8B5CF6" opacity="0.4" />
    <circle cx="900" cy="500" r="10" fill="#0A0A0F" stroke="#3B82F6" stroke-width="1.5" />
    <circle cx="900" cy="500" r="4" fill="#3B82F6" opacity="0.4" />
    <circle cx="230" cy="220" r="10" fill="#0A0A0F" stroke="#06B6D4" stroke-width="1.5" />
    <circle cx="230" cy="220" r="4" fill="#06B6D4" opacity="0.4" />
    <circle cx="970" cy="220" r="10" fill="#0A0A0F" stroke="#06B6D4" stroke-width="1.5" />
    <circle cx="970" cy="220" r="4" fill="#06B6D4" opacity="0.4" />
    <circle cx="230" cy="410" r="10" fill="#0A0A0F" stroke="#3B82F6" stroke-width="1.5" />
    <circle cx="230" cy="410" r="4" fill="#3B82F6" opacity="0.4" />
    <circle cx="970" cy="410" r="10" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="1.5" />
    <circle cx="970" cy="410" r="4" fill="#8B5CF6" opacity="0.4" />
    <circle cx="350" cy="280" r="8" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="1.5" />
    <circle cx="850" cy="280" r="8" fill="#0A0A0F" stroke="#3B82F6" stroke-width="1.5" />
    <circle cx="350" cy="360" r="8" fill="#0A0A0F" stroke="#06B6D4" stroke-width="1.5" />
    <circle cx="850" cy="360" r="8" fill="#0A0A0F" stroke="#06B6D4" stroke-width="1.5" />
  </g>

  <!-- Outer nodes (faint) -->
  <g opacity="0.4">
    <circle cx="150" cy="80" r="6" fill="#0A0A0F" stroke="#3B82F6" stroke-width="1" />
    <circle cx="1050" cy="80" r="6" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="1" />
    <circle cx="150" cy="550" r="6" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="1" />
    <circle cx="1050" cy="550" r="6" fill="#0A0A0F" stroke="#3B82F6" stroke-width="1" />
    <circle cx="100" cy="180" r="5" fill="#0A0A0F" stroke="#06B6D4" stroke-width="1" />
    <circle cx="1100" cy="180" r="5" fill="#0A0A0F" stroke="#06B6D4" stroke-width="1" />
    <circle cx="100" cy="450" r="5" fill="#0A0A0F" stroke="#3B82F6" stroke-width="1" />
    <circle cx="1100" cy="450" r="5" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="1" />
  </g>

  <!-- Decorative floating particles -->
  <g fill="#06B6D4" opacity="0.15">
    <circle cx="520" cy="150" r="2" />
    <circle cx="680" cy="480" r="2" />
    <circle cx="180" cy="300" r="1.5" />
    <circle cx="1020" cy="320" r="1.5" />
    <circle cx="400" cy="550" r="1" />
    <circle cx="800" cy="80" r="1" />
  </g>
</svg>