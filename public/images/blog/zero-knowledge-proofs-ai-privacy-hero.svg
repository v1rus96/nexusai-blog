<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a3e" />
      <stop offset="100%" stop-color="#0a0a1a" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-wide" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="16" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad-shield" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <linearGradient id="grad-blue-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-glow)" />

  <!-- Central shield shape -->
  <g transform="translate(600,290)" filter="url(#glow-wide)">
    <path d="M0 -140 L120 -80 L120 50 Q120 130 0 170 Q-120 130 -120 50 L-120 -80 Z" fill="none" stroke="url(#grad-shield)" stroke-width="2.5" opacity="0.8" />
    <path d="M0 -140 L120 -80 L120 50 Q120 130 0 170 Q-120 130 -120 50 L-120 -80 Z" fill="#8B5CF6" opacity="0.03" />
  </g>

  <!-- Lock icon in shield center -->
  <g transform="translate(600,280)" filter="url(#glow)" opacity="0.7">
    <rect x="-25" y="-5" width="50" height="40" rx="5" fill="none" stroke="#06B6D4" stroke-width="2" />
    <path d="M-15 -5 L-15 -25 Q-15 -45 0 -45 Q15 -45 15 -25 L15 -5" fill="none" stroke="#06B6D4" stroke-width="2" />
    <circle cx="0" cy="15" r="6" fill="#06B6D4" opacity="0.5" />
    <line x1="0" y1="21" x2="0" y2="28" stroke="#06B6D4" stroke-width="2" />
  </g>

  <!-- Circuit patterns radiating from shield -->
  <g stroke="#3B82F6" stroke-width="1" fill="none" opacity="0.2">
    <!-- Left circuits -->
    <path d="M480 200 L400 200 L400 160 L320 160" />
    <circle cx="320" cy="160" r="4" fill="#3B82F6" opacity="0.5" />
    <path d="M480 260 L380 260 L380 300 L280 300" />
    <circle cx="280" cy="300" r="4" fill="#3B82F6" opacity="0.5" />
    <path d="M480 350 L360 350 L360 410 L260 410" />
    <circle cx="260" cy="410" r="4" fill="#8B5CF6" opacity="0.5" />
    <path d="M480 150 L420 150 L420 100 L340 100 L340 60" />
    <circle cx="340" cy="60" r="3" fill="#06B6D4" opacity="0.5" />
    <!-- Right circuits -->
    <path d="M720 200 L800 200 L800 160 L880 160" />
    <circle cx="880" cy="160" r="4" fill="#3B82F6" opacity="0.5" />
    <path d="M720 260 L820 260 L820 300 L920 300" />
    <circle cx="920" cy="300" r="4" fill="#3B82F6" opacity="0.5" />
    <path d="M720 350 L840 350 L840 410 L940 410" />
    <circle cx="940" cy="410" r="4" fill="#8B5CF6" opacity="0.5" />
    <path d="M720 150 L780 150 L780 100 L860 100 L860 60" />
    <circle cx="860" cy="60" r="3" fill="#06B6D4" opacity="0.5" />
  </g>

  <!-- ZK proof visualization: data → proof → verify -->
  <g opacity="0.4" filter="url(#glow)">
    <!-- Data block (left) -->
    <rect x="100" y="460" width="120" height="60" rx="4" fill="none" stroke="#3B82F6" stroke-width="1.5" />
    <text x="160" y="485" text-anchor="middle" fill="#3B82F6" font-family="monospace" font-size="10">DATA</text>
    <g fill="#3B82F6" opacity="0.4" font-family="monospace" font-size="8">
      <text x="120" y="505">0x7f3a...</text>
    </g>

    <!-- Arrow -->
    <line x1="230" y1="490" x2="330" y2="490" stroke="#8B5CF6" stroke-width="1.5" />
    <polygon points="330,485 340,490 330,495" fill="#8B5CF6" />
    <text x="280" y="480" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="9">prove</text>

    <!-- Proof block (middle) -->
    <rect x="350" y="460" width="140" height="60" rx="4" fill="none" stroke="#8B5CF6" stroke-width="1.5" />
    <text x="420" y="485" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="10">ZK PROOF</text>
    <text x="420" y="505" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="8" opacity="0.5">π = (A,B,C)</text>

    <!-- Arrow -->
    <line x1="500" y1="490" x2="600" y2="490" stroke="#06B6D4" stroke-width="1.5" />
    <polygon points="600,485 610,490 600,495" fill="#06B6D4" />
    <text x="550" y="480" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="9">verify</text>

    <!-- Verify block (right) -->
    <rect x="620" y="460" width="120" height="60" rx="4" fill="none" stroke="#06B6D4" stroke-width="1.5" />
    <text x="680" y="490" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="10">✓ VALID</text>
  </g>

  <!-- Binary data streams -->
  <g fill="#8B5CF6" font-family="monospace" font-size="9" opacity="0.08">
    <text x="50" y="80">01101001 10110010 01001101 11010110</text>
    <text x="800" y="550">10101110 01100011 11001010 01011001</text>
    <text x="900" y="80">01001110 11010010</text>
    <text x="50" y="560">11100010 01011101</text>
  </g>

  <!-- Floating encrypted particles -->
  <g fill="#06B6D4" opacity="0.25">
    <circle cx="170" cy="140" r="2" /><circle cx="1050" cy="200" r="2.5" />
    <circle cx="250" cy="520" r="1.5" /><circle cx="980" cy="500" r="2" />
    <circle cx="600" cy="80" r="3" /><circle cx="150" cy="380" r="1.5" />
    <circle cx="1060" cy="380" r="2" />
  </g>

  <!-- Concentric privacy rings -->
  <g stroke="#8B5CF6" fill="none" opacity="0.06" transform="translate(600,290)">
    <circle r="200" /><circle r="240" /><circle r="280" />
  </g>
</svg>
