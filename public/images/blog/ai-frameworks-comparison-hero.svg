<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#12112b"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    
    <!-- Framework gradients -->
    <linearGradient id="g1" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="50%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="g2" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#67e8f9"/>
      <stop offset="50%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="g3" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#c084fc"/>
      <stop offset="50%" stop-color="#8b5cf6"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
    <linearGradient id="g4" x1="0" y1="0" x2="1" y2="1" gradientUnits="objectBoundingBox">
      <stop offset="0%" stop-color="#34d399"/>
      <stop offset="50%" stop-color="#10b981"/>
      <stop offset="100%" stop-color="#059669"/>
    </linearGradient>
    
    <!-- Glow filters -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    
    <filter id="strongGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="12" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Particle animations -->
    <circle id="particle" r="1.5" opacity="0.6">
      <animateTransform attributeName="transform" type="translate" values="0,0; 50,20; 100,0" dur="4s" repeatCount="indefinite"/>
      <animate attributeName="opacity" values="0; 0.8; 0" dur="4s" repeatCount="indefinite"/>
    </circle>
  </defs>
  
  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Neural network background pattern -->
  <g opacity="0.08" stroke="#ffffff" stroke-width="0.5">
    <path d="M100 100 Q300 200 500 150 T900 180 L1100 120"/>
    <path d="M150 200 Q350 300 550 250 T950 280 L1150 220"/>
    <path d="M80 300 Q280 400 480 350 T880 380 L1080 320"/>
    <circle cx="100" cy="100" r="3" fill="#ffffff"/>
    <circle cx="300" cy="200" r="2" fill="#ffffff"/>
    <circle cx="500" cy="150" r="3" fill="#ffffff"/>
    <circle cx="700" cy="180" r="2" fill="#ffffff"/>
    <circle cx="900" cy="180" r="3" fill="#ffffff"/>
    <circle cx="1100" cy="120" r="2" fill="#ffffff"/>
  </g>
  
  <!-- Floating particles -->
  <g opacity="0.4">
    <use href="#particle" x="200" y="100" fill="#3b82f6"/>
    <use href="#particle" x="400" y="80" fill="#06b6d4"/>
    <use href="#particle" x="600" y="120" fill="#8b5cf6"/>
    <use href="#particle" x="800" y="90" fill="#10b981"/>
    <use href="#particle" x="1000" y="110" fill="#3b82f6"/>
    <use href="#particle" x="150" y="500" fill="#06b6d4"/>
    <use href="#particle" x="350" y="520" fill="#8b5cf6"/>
    <use href="#particle" x="750" y="480" fill="#10b981"/>
    <use href="#particle" x="950" y="510" fill="#3b82f6"/>
  </g>
  
  <!-- Framework containers with improved layout -->
  <!-- LangChain -->
  <g transform="translate(60, 180)">
    <rect x="0" y="0" width="240" height="180" rx="20" fill="url(#g1)" opacity="0.15" stroke="url(#g1)" stroke-width="2" filter="url(#glow)"/>
    <circle cx="120" cy="60" r="30" fill="none" stroke="url(#g1)" stroke-width="3" filter="url(#glow)"/>
    <path d="M95 60 L120 35 L145 60 L120 85 Z M105 50 L135 50 M105 70 L135 70" fill="none" stroke="url(#g1)" stroke-width="2.5"/>
    <text x="120" y="130" text-anchor="middle" fill="#60a5fa" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" filter="url(#strongGlow)">LangChain</text>
    <text x="120" y="155" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Chain-based LLMs</text>
  </g>
  
  <!-- AutoGPT -->
  <g transform="translate(340, 150)">
    <rect x="0" y="0" width="240" height="180" rx="20" fill="url(#g2)" opacity="0.15" stroke="url(#g2)" stroke-width="2" filter="url(#glow)"/>
    <circle cx="120" cy="60" r="30" fill="none" stroke="url(#g2)" stroke-width="3" filter="url(#glow)"/>
    <path d="M100 60 Q110 40 120 60 Q130 40 140 60 M105 50 L135 50 M105 70 L135 70 M120 45 V75" stroke="url(#g2)" stroke-width="2.5" fill="none"/>
    <text x="120" y="130" text-anchor="middle" fill="#67e8f9" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" filter="url(#strongGlow)">AutoGPT</text>
    <text x="120" y="155" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Autonomous AI</text>
  </g>
  
  <!-- CrewAI -->
  <g transform="translate(620, 180)">
    <rect x="0" y="0" width="240" height="180" rx="20" fill="url(#g3)" opacity="0.15" stroke="url(#g3)" stroke-width="2" filter="url(#glow)"/>
    <circle cx="120" cy="60" r="30" fill="none" stroke="url(#g3)" stroke-width="3" filter="url(#glow)"/>
    <circle cx="105" cy="50" r="8" fill="none" stroke="url(#g3)" stroke-width="2"/>
    <circle cx="135" cy="50" r="8" fill="none" stroke="url(#g3)" stroke-width="2"/>
    <circle cx="120" cy="75" r="8" fill="none" stroke="url(#g3)" stroke-width="2"/>
    <path d="M105 50 L135 50 L120 75 Z M113 58 L127 58" stroke="url(#g3)" stroke-width="2" fill="none"/>
    <text x="120" y="130" text-anchor="middle" fill="#c084fc" font-family="system-ui, -apple-system, sans-serif" font-size="28" font-weight="700" filter="url(#strongGlow)">CrewAI</text>
    <text x="120" y="155" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Multi-Agent Teams</text>
  </g>
  
  <!-- Semantic Kernel -->
  <g transform="translate(900, 160)">
    <rect x="0" y="0" width="240" height="180" rx="20" fill="url(#g4)" opacity="0.15" stroke="url(#g4)" stroke-width="2" filter="url(#glow)"/>
    <circle cx="120" cy="60" r="30" fill="none" stroke="url(#g4)" stroke-width="3" filter="url(#glow)"/>
    <rect x="105" y="45" width="30" height="30" rx="6" fill="none" stroke="url(#g4)" stroke-width="2"/>
    <circle cx="120" cy="60" r="12" fill="url(#g4)" opacity="0.3"/>
    <path d="M112 52 L128 52 M112 60 L128 60 M112 68 L128 68" stroke="url(#g4)" stroke-width="1.5"/>
    <text x="120" y="125" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" filter="url(#strongGlow)">Semantic</text>
    <text x="120" y="148" text-anchor="middle" fill="#34d399" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="700" filter="url(#strongGlow)">Kernel</text>
    <text x="120" y="168" text-anchor="middle" fill="#94a3b8" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="400">Microsoft AI SDK</text>
  </g>
  
  <!-- Dynamic flowing connections -->
  <g opacity="0.4">
    <path d="M300 270 Q420 200 580 270" stroke="url(#g1)" stroke-width="2" fill="none" stroke-dasharray="8,4" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" values="0; 24" dur="3s" repeatCount="indefinite"/>
    </path>
    <path d="M580 270 Q720 200 860 270" stroke="url(#g2)" stroke-width="2" fill="none" stroke-dasharray="8,4" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" values="0; 24" dur="3s" repeatCount="indefinite" begin="0.5s"/>
    </path>
    <path d="M860 270 Q980 200 1140 270" stroke="url(#g3)" stroke-width="2" fill="none" stroke-dasharray="8,4" filter="url(#glow)">
      <animate attributeName="stroke-dashoffset" values="0; 24" dur="3s" repeatCount="indefinite" begin="1s"/>
    </path>
  </g>
  
  <!-- Comparison indicators -->
  <g opacity="0.6">
    <text x="420" y="235" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">VS</text>
    <text x="720" y="235" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">VS</text>
    <text x="980" y="235" text-anchor="middle" fill="#ffffff" font-family="system-ui, -apple-system, sans-serif" font-size="18" font-weight="500">VS</text>
  </g>
  
  <!-- Performance visualization bars -->
  <g transform="translate(0, 420)">
    <g opacity="0.7">
      <rect x="120" y="40" width="12" height="60" rx="6" fill="url(#g1)" filter="url(#glow)"/>
      <rect x="140" y="20" width="12" height="80" rx="6" fill="url(#g1)" filter="url(#glow)"/>
      <rect x="160" y="30" width="12" height="70" rx="6" fill="url(#g1)" filter="url(#glow)"/>
      
      <rect x="400" y="35" width="12" height="65" rx="6" fill="url(#g2)" filter="url(#glow)"/>
      <rect x="420" y="15" width="12" height="85" rx="6" fill="url(#g2)" filter="url(#glow)"/>
      <rect x="440" y="45" width="12" height="55" rx="6" fill="url(#g2)" filter="url(#glow)"/>
      
      <rect x="680" y="25" width="12" height="75" rx="6" fill="url(#g3)" filter="url(#glow)"/>
      <rect x="700" y="40" width="12" height="60" rx="6" fill="url(#g3)" filter="url(#glow)"/>
      <rect x="720" y="30" width="12" height="70" rx="6" fill="url(#g3)" filter="url(#glow)"/>
      
      <rect x="960" y="35" width="12" height="65" rx="6" fill="url(#g4)" filter="url(#glow)"/>
      <rect x="980" y="25" width="12" height="75" rx="6" fill="url(#g4)" filter="url(#glow)"/>
      <rect x="1000" y="50" width="12" height="50" rx="6" fill="url(#g4)" filter="url(#glow)"/>
    </g>
  </g>
  
  <!-- Subtle grid overlay -->
  <g opacity="0.03" stroke="#ffffff" stroke-width="0.5">
    <defs>
      <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
        <path d="M 50 0 L 0 0 0 50" fill="none" stroke="#ffffff" stroke-width="0.5"/>
      </pattern>
    </defs>
    <rect width="100%" height="100%" fill="url(#grid)"/>
  </g>
  
  <!-- Central glow effects -->
  <circle cx="600" cy="300" r="150" fill="url(#g2)" opacity="0.02"/>
  <circle cx="600" cy="300" r="200" fill="url(#g3)" opacity="0.01"/>
</svg>