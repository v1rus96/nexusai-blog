<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <linearGradient id="eco-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="eco-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background subtle gradient -->
  <rect width="800" height="400" fill="#0A0A0F" rx="8" />
  <rect width="800" height="400" fill="url(#eco-grad)" opacity="0.03" rx="8" />

  <!-- Left panel: Traditional (gray, rigid) -->
  <g transform="translate(50,40)">
    <text x="150" y="0" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="14" font-weight="600">Traditional Automation</text>

    <!-- Linear flowchart nodes -->
    <rect x="110" y="25" width="80" height="36" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <text x="150" y="48" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="11">Input</text>

    <line x1="150" y1="61" x2="150" y2="85" stroke="#4B5563" stroke-width="1" />
    <polygon points="146,83 150,90 154,83" fill="#4B5563" />

    <rect x="110" y="90" width="80" height="36" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <text x="150" y="113" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="11">Rule Check</text>

    <line x1="150" y1="126" x2="150" y2="150" stroke="#4B5563" stroke-width="1" />
    <polygon points="146,148 150,155 154,148" fill="#4B5563" />

    <!-- Diamond decision -->
    <polygon points="150,160 180,180 150,200 120,180" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <text x="150" y="184" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="9">IF/ELSE</text>

    <line x1="150" y1="200" x2="150" y2="225" stroke="#4B5563" stroke-width="1" />
    <polygon points="146,223 150,230 154,223" fill="#4B5563" />

    <rect x="110" y="230" width="80" height="36" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <text x="150" y="253" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="11">Execute</text>

    <line x1="150" y1="266" x2="150" y2="290" stroke="#4B5563" stroke-width="1" />
    <polygon points="146,288 150,295 154,288" fill="#4B5563" />

    <rect x="110" y="295" width="80" height="36" rx="4" fill="rgba(255,255,255,0.04)" stroke="rgba(255,255,255,0.1)" stroke-width="1" />
    <text x="150" y="318" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="11">Output</text>
  </g>

  <!-- VS divider -->
  <line x1="400" y1="50" x2="400" y2="360" stroke="url(#eco-grad)" stroke-width="1" opacity="0.3" />
  <g transform="translate(400,200)">
    <rect x="-20" y="-14" width="40" height="28" rx="14" fill="#0A0A0F" stroke="url(#eco-grad)" stroke-width="1" />
    <text x="0" y="5" text-anchor="middle" fill="#8B5CF6" font-family="Inter, sans-serif" font-size="12" font-weight="700">VS</text>
  </g>

  <!-- Right panel: AI Agents (dynamic, colorful) -->
  <g transform="translate(450,40)">
    <text x="175" y="0" text-anchor="middle" fill="#E5E7EB" font-family="Inter, sans-serif" font-size="14" font-weight="600">AI Agent Network</text>

    <!-- Radial glow behind -->
    <circle cx="175" cy="180" r="120" fill="#3B82F6" opacity="0.04" />

    <!-- Dynamic web of nodes -->
    <!-- Curved connections -->
    <g stroke-width="1.5" fill="none" opacity="0.5">
      <path d="M100,80 Q140,130 175,100" stroke="#3B82F6" />
      <path d="M175,100 Q220,80 260,120" stroke="#8B5CF6" />
      <path d="M260,120 Q280,180 240,220" stroke="#06B6D4" />
      <path d="M240,220 Q200,260 140,240" stroke="#3B82F6" />
      <path d="M140,240 Q90,210 100,160" stroke="#8B5CF6" />
      <path d="M100,160 Q95,120 100,80" stroke="#06B6D4" />
      <path d="M175,100 Q160,160 175,180" stroke="#3B82F6" opacity="0.3" />
      <path d="M175,180 Q190,220 240,220" stroke="#8B5CF6" opacity="0.3" />
      <path d="M175,180 Q150,210 140,240" stroke="#06B6D4" opacity="0.3" />
      <path d="M100,160 Q140,170 175,180" stroke="#3B82F6" opacity="0.3" />
      <path d="M260,120 Q220,150 175,180" stroke="#8B5CF6" opacity="0.3" />
      <!-- Extra branches -->
      <path d="M100,80 Q60,110 70,160" stroke="#06B6D4" opacity="0.3" />
      <path d="M260,120 Q300,140 310,180" stroke="#3B82F6" opacity="0.3" />
      <path d="M140,240 Q130,280 150,300" stroke="#8B5CF6" opacity="0.3" />
      <path d="M240,220 Q270,260 280,280" stroke="#06B6D4" opacity="0.3" />
    </g>

    <!-- Nodes -->
    <circle cx="100" cy="80" r="16" fill="#0A0A0F" stroke="#3B82F6" stroke-width="2" filter="url(#eco-glow)" />
    <text x="100" y="84" text-anchor="middle" fill="#3B82F6" font-family="Inter, sans-serif" font-size="9" font-weight="600">Plan</text>

    <circle cx="260" cy="120" r="16" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="2" filter="url(#eco-glow)" />
    <text x="260" y="124" text-anchor="middle" fill="#8B5CF6" font-family="Inter, sans-serif" font-size="9" font-weight="600">Code</text>

    <circle cx="240" cy="220" r="16" fill="#0A0A0F" stroke="#06B6D4" stroke-width="2" filter="url(#eco-glow)" />
    <text x="240" y="224" text-anchor="middle" fill="#06B6D4" font-family="Inter, sans-serif" font-size="9" font-weight="600">Test</text>

    <circle cx="140" cy="240" r="16" fill="#0A0A0F" stroke="#3B82F6" stroke-width="2" filter="url(#eco-glow)" />
    <text x="140" y="244" text-anchor="middle" fill="#3B82F6" font-family="Inter, sans-serif" font-size="9" font-weight="600">Data</text>

    <circle cx="100" cy="160" r="16" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="2" filter="url(#eco-glow)" />
    <text x="100" y="164" text-anchor="middle" fill="#8B5CF6" font-family="Inter, sans-serif" font-size="9" font-weight="600">Tool</text>

    <circle cx="175" cy="100" r="16" fill="#0A0A0F" stroke="#06B6D4" stroke-width="2" filter="url(#eco-glow)" />
    <text x="175" y="104" text-anchor="middle" fill="#06B6D4" font-family="Inter, sans-serif" font-size="9" font-weight="600">API</text>

    <!-- Central orchestrator -->
    <circle cx="175" cy="180" r="22" fill="#0A0A0F" stroke="url(#eco-grad)" stroke-width="2.5" filter="url(#eco-glow)" />
    <text x="175" y="176" text-anchor="middle" fill="#E5E7EB" font-family="Inter, sans-serif" font-size="9" font-weight="700">Agent</text>
    <text x="175" y="188" text-anchor="middle" fill="#8B5CF6" font-family="Inter, sans-serif" font-size="8">Core</text>

    <!-- Outer leaf nodes -->
    <circle cx="70" cy="160" r="8" fill="#06B6D4" opacity="0.2" stroke="#06B6D4" stroke-width="1" />
    <circle cx="310" cy="180" r="8" fill="#3B82F6" opacity="0.2" stroke="#3B82F6" stroke-width="1" />
    <circle cx="150" cy="300" r="8" fill="#8B5CF6" opacity="0.2" stroke="#8B5CF6" stroke-width="1" />
    <circle cx="280" cy="280" r="8" fill="#06B6D4" opacity="0.2" stroke="#06B6D4" stroke-width="1" />
  </g>
</svg>
