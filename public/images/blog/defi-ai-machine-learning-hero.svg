<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <radialGradient id="bg-glow" cx="50%" cy="50%" r="60%">
      <stop offset="0%" stop-color="#1a1a3e" />
      <stop offset="100%" stop-color="#0a0a1a" />
    </radialGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="glow-soft" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="12" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <linearGradient id="grad-blue-violet" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="100%" stop-color="#8B5CF6" />
    </linearGradient>
    <linearGradient id="grad-cyan-blue" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#06B6D4" />
      <stop offset="100%" stop-color="#3B82F6" />
    </linearGradient>
    <linearGradient id="chart-grad" x1="0%" y1="100%" x2="0%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" stop-opacity="0.1" />
      <stop offset="100%" stop-color="#06B6D4" stop-opacity="0.4" />
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg-glow)" />

  <!-- Grid lines -->
  <g opacity="0.05" stroke="#3B82F6" stroke-width="1">
    <line x1="0" y1="150" x2="1200" y2="150" />
    <line x1="0" y1="250" x2="1200" y2="250" />
    <line x1="0" y1="350" x2="1200" y2="350" />
    <line x1="0" y1="450" x2="1200" y2="450" />
    <line x1="200" y1="0" x2="200" y2="630" />
    <line x1="400" y1="0" x2="400" y2="630" />
    <line x1="600" y1="0" x2="600" y2="630" />
    <line x1="800" y1="0" x2="800" y2="630" />
    <line x1="1000" y1="0" x2="1000" y2="630" />
  </g>

  <!-- Chart area fill -->
  <path d="M150 480 L280 390 L410 420 L540 310 L670 280 L800 200 L930 170 L1050 120 L1050 480 Z" fill="url(#chart-grad)" opacity="0.6" />

  <!-- Chart line -->
  <polyline points="150,480 280,390 410,420 540,310 670,280 800,200 930,170 1050,120" fill="none" stroke="url(#grad-cyan-blue)" stroke-width="3" filter="url(#glow)" />

  <!-- Chart data points -->
  <g filter="url(#glow)">
    <circle cx="150" cy="480" r="5" fill="#06B6D4" />
    <circle cx="280" cy="390" r="5" fill="#06B6D4" />
    <circle cx="410" cy="420" r="5" fill="#3B82F6" />
    <circle cx="540" cy="310" r="5" fill="#3B82F6" />
    <circle cx="670" cy="280" r="5" fill="#8B5CF6" />
    <circle cx="800" cy="200" r="5" fill="#8B5CF6" />
    <circle cx="930" cy="170" r="6" fill="#A855F7" />
    <circle cx="1050" cy="120" r="7" fill="#A855F7" />
  </g>

  <!-- Neural network nodes (left cluster) -->
  <g filter="url(#glow-soft)" opacity="0.7">
    <!-- Input layer -->
    <circle cx="100" cy="180" r="12" fill="none" stroke="#3B82F6" stroke-width="2" />
    <circle cx="100" cy="260" r="12" fill="none" stroke="#3B82F6" stroke-width="2" />
    <circle cx="100" cy="340" r="12" fill="none" stroke="#3B82F6" stroke-width="2" />
    <!-- Hidden layer -->
    <circle cx="220" cy="210" r="10" fill="none" stroke="#8B5CF6" stroke-width="2" />
    <circle cx="220" cy="300" r="10" fill="none" stroke="#8B5CF6" stroke-width="2" />
    <!-- Output -->
    <circle cx="340" cy="255" r="14" fill="none" stroke="#06B6D4" stroke-width="2.5" />
    <!-- Connections -->
    <g stroke="url(#grad-blue-violet)" stroke-width="1" opacity="0.4">
      <line x1="112" y1="180" x2="210" y2="210" />
      <line x1="112" y1="180" x2="210" y2="300" />
      <line x1="112" y1="260" x2="210" y2="210" />
      <line x1="112" y1="260" x2="210" y2="300" />
      <line x1="112" y1="340" x2="210" y2="210" />
      <line x1="112" y1="340" x2="210" y2="300" />
      <line x1="230" y1="210" x2="326" y2="255" />
      <line x1="230" y1="300" x2="326" y2="255" />
    </g>
  </g>

  <!-- DeFi token symbols (right side) -->
  <g filter="url(#glow)" opacity="0.5">
    <circle cx="950" cy="350" r="30" fill="none" stroke="#8B5CF6" stroke-width="1.5" />
    <text x="950" y="358" text-anchor="middle" fill="#8B5CF6" font-family="monospace" font-size="20">Ξ</text>
    <circle cx="1080" cy="400" r="25" fill="none" stroke="#3B82F6" stroke-width="1.5" />
    <text x="1080" y="407" text-anchor="middle" fill="#3B82F6" font-family="monospace" font-size="18">₿</text>
    <circle cx="1020" cy="480" r="22" fill="none" stroke="#06B6D4" stroke-width="1.5" />
    <text x="1020" y="487" text-anchor="middle" fill="#06B6D4" font-family="monospace" font-size="16">◈</text>
  </g>

  <!-- Connecting arcs between network and chart -->
  <g stroke="#8B5CF6" stroke-width="1" fill="none" opacity="0.15">
    <path d="M354 255 Q500 200 540 310" />
    <path d="M354 255 Q450 150 670 280" />
  </g>

  <!-- Floating data particles -->
  <g fill="#06B6D4" opacity="0.3">
    <circle cx="460" cy="150" r="2" /><circle cx="520" cy="520" r="1.5" />
    <circle cx="750" cy="100" r="2.5" /><circle cx="880" cy="530" r="2" />
    <circle cx="350" cy="550" r="1.5" /><circle cx="1100" cy="250" r="2" />
  </g>

  <!-- Circuit traces bottom -->
  <g opacity="0.06" stroke="#3B82F6" stroke-width="1" fill="none">
    <path d="M0 590 L100 590 L100 560 L200 560" />
    <path d="M1000 610 L1100 610 L1100 580 L1200 580" />
  </g>
</svg>
