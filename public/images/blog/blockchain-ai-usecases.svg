<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" width="800" height="800">
  <defs>
    <linearGradient id="uc-hub-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="uc-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="800" height="800" fill="#0A0A0F" rx="8" />

  <!-- Spoke lines from center to satellites -->
  <g stroke-width="1.5" opacity="0.3">
    <line x1="400" y1="400" x2="400" y2="160" stroke="#3B82F6" />
    <line x1="400" y1="400" x2="608" y2="280" stroke="#8B5CF6" />
    <line x1="400" y1="400" x2="608" y2="520" stroke="#06B6D4" />
    <line x1="400" y1="400" x2="400" y2="640" stroke="#3B82F6" />
    <line x1="400" y1="400" x2="192" y2="520" stroke="#8B5CF6" />
    <line x1="400" y1="400" x2="192" y2="280" stroke="#06B6D4" />
  </g>

  <!-- Central hub -->
  <g filter="url(#uc-glow)" transform="translate(400,400)">
    <polygon points="0,-45 39,-22 39,22 0,45 -39,22 -39,-22" fill="#0A0A0F" stroke="url(#uc-hub-grad)" stroke-width="2.5" />
    <!-- AI+Blockchain icon -->
    <circle cx="-8" cy="-4" r="8" fill="none" stroke="#3B82F6" stroke-width="1.5" />
    <rect x="2" y="-10" width="14" height="12" rx="2" fill="none" stroke="#8B5CF6" stroke-width="1.5" />
    <!-- Link symbol -->
    <line x1="-2" y1="2" x2="6" y2="2" stroke="#06B6D4" stroke-width="1.5" />
    <text x="0" y="25" text-anchor="middle" fill="#E5E7EB" font-family="Inter, sans-serif" font-size="9" font-weight="600">AI × Chain</text>
  </g>

  <!-- Satellite 1: DeFi (top) -->
  <g transform="translate(400,160)">
    <circle cx="0" cy="0" r="38" fill="#0A0A0F" stroke="#3B82F6" stroke-width="2" filter="url(#uc-glow)" />
    <circle cx="0" cy="0" r="38" fill="rgba(59,130,246,0.06)" />
    <!-- Finance icon: columns -->
    <rect x="-12" y="-10" width="6" height="16" rx="1" fill="#3B82F6" opacity="0.7" />
    <rect x="-3" y="-14" width="6" height="20" rx="1" fill="#3B82F6" opacity="0.9" />
    <rect x="6" y="-6" width="6" height="12" rx="1" fill="#3B82F6" opacity="0.5" />
    <text x="0" y="55" text-anchor="middle" fill="#93C5FD" font-family="Inter, sans-serif" font-size="13" font-weight="600">DeFi</text>
    <text x="0" y="70" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">Automated Trading</text>
  </g>

  <!-- Satellite 2: Healthcare (top-right) -->
  <g transform="translate(608,280)">
    <circle cx="0" cy="0" r="38" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="2" filter="url(#uc-glow)" />
    <circle cx="0" cy="0" r="38" fill="rgba(139,92,246,0.06)" />
    <!-- Medical cross -->
    <rect x="-3" y="-12" width="6" height="24" rx="1" fill="#8B5CF6" />
    <rect x="-12" y="-3" width="24" height="6" rx="1" fill="#8B5CF6" />
    <text x="0" y="55" text-anchor="middle" fill="#C4B5FD" font-family="Inter, sans-serif" font-size="13" font-weight="600">Healthcare</text>
    <text x="0" y="70" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">Secure Records</text>
  </g>

  <!-- Satellite 3: Supply Chain (bottom-right) -->
  <g transform="translate(608,520)">
    <circle cx="0" cy="0" r="38" fill="#0A0A0F" stroke="#06B6D4" stroke-width="2" filter="url(#uc-glow)" />
    <circle cx="0" cy="0" r="38" fill="rgba(6,182,212,0.06)" />
    <!-- Chain link icon -->
    <ellipse cx="-6" cy="0" rx="8" ry="5" fill="none" stroke="#06B6D4" stroke-width="1.8" transform="rotate(-30,-6,0)" />
    <ellipse cx="6" cy="0" rx="8" ry="5" fill="none" stroke="#06B6D4" stroke-width="1.8" transform="rotate(-30,6,0)" />
    <text x="0" y="55" text-anchor="middle" fill="#67E8F9" font-family="Inter, sans-serif" font-size="13" font-weight="600">Supply Chain</text>
    <text x="0" y="70" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">Provenance</text>
  </g>

  <!-- Satellite 4: Digital Identity (bottom) -->
  <g transform="translate(400,640)">
    <circle cx="0" cy="0" r="38" fill="#0A0A0F" stroke="#3B82F6" stroke-width="2" filter="url(#uc-glow)" />
    <circle cx="0" cy="0" r="38" fill="rgba(59,130,246,0.06)" />
    <!-- Fingerprint icon -->
    <path d="M-8,6 C-8,-8 8,-8 8,6" fill="none" stroke="#3B82F6" stroke-width="1.5" />
    <path d="M-4,6 C-4,-4 4,-4 4,6" fill="none" stroke="#3B82F6" stroke-width="1.5" />
    <line x1="0" y1="-1" x2="0" y2="6" stroke="#3B82F6" stroke-width="1.5" />
    <text x="0" y="55" text-anchor="middle" fill="#93C5FD" font-family="Inter, sans-serif" font-size="13" font-weight="600">Digital Identity</text>
    <text x="0" y="70" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">Self-Sovereign</text>
  </g>

  <!-- Satellite 5: Energy (bottom-left) -->
  <g transform="translate(192,520)">
    <circle cx="0" cy="0" r="38" fill="#0A0A0F" stroke="#8B5CF6" stroke-width="2" filter="url(#uc-glow)" />
    <circle cx="0" cy="0" r="38" fill="rgba(139,92,246,0.06)" />
    <!-- Lightning bolt -->
    <path d="M2,-14 L-6,2 L2,2 L-2,14 L8,0 L2,0Z" fill="#8B5CF6" />
    <text x="0" y="55" text-anchor="middle" fill="#C4B5FD" font-family="Inter, sans-serif" font-size="13" font-weight="600">Energy</text>
    <text x="0" y="70" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">Grid Trading</text>
  </g>

  <!-- Satellite 6: Governance (top-left) -->
  <g transform="translate(192,280)">
    <circle cx="0" cy="0" r="38" fill="#0A0A0F" stroke="#06B6D4" stroke-width="2" filter="url(#uc-glow)" />
    <circle cx="0" cy="0" r="38" fill="rgba(6,182,212,0.06)" />
    <!-- Ballot box icon -->
    <rect x="-10" y="-4" width="20" height="14" rx="2" fill="none" stroke="#06B6D4" stroke-width="1.5" />
    <line x1="-4" y1="-4" x2="-4" y2="-9" stroke="#06B6D4" stroke-width="1.5" />
    <rect x="-6" y="-12" width="12" height="5" rx="1" fill="#06B6D4" opacity="0.5" />
    <text x="0" y="55" text-anchor="middle" fill="#67E8F9" font-family="Inter, sans-serif" font-size="13" font-weight="600">Governance</text>
    <text x="0" y="70" text-anchor="middle" fill="#6B7280" font-family="Inter, sans-serif" font-size="10">DAO Voting</text>
  </g>
</svg>
