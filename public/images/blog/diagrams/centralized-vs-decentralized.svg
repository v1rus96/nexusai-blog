<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" fill="none">
  <rect width="800" height="400" rx="12" fill="#0F1117"/>
  <!-- Left: Centralized -->
  <text x="200" y="40" text-anchor="middle" fill="#E2E8F0" font-family="sans-serif" font-size="16" font-weight="bold">Centralized AI</text>
  <rect x="155" y="100" width="90" height="40" rx="8" fill="#6366F1"/>
  <text x="200" y="125" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="12">Server</text>
  <!-- Users -->
  <circle cx="100" cy="230" r="18" fill="#1E293B" stroke="#818CF8" stroke-width="1.5"/>
  <text x="100" y="234" text-anchor="middle" fill="#C7D2FE" font-family="sans-serif" font-size="10">User</text>
  <circle cx="200" cy="270" r="18" fill="#1E293B" stroke="#818CF8" stroke-width="1.5"/>
  <text x="200" y="274" text-anchor="middle" fill="#C7D2FE" font-family="sans-serif" font-size="10">User</text>
  <circle cx="300" cy="230" r="18" fill="#1E293B" stroke="#818CF8" stroke-width="1.5"/>
  <text x="300" y="234" text-anchor="middle" fill="#C7D2FE" font-family="sans-serif" font-size="10">User</text>
  <circle cx="150" cy="310" r="18" fill="#1E293B" stroke="#818CF8" stroke-width="1.5"/>
  <text x="150" y="314" text-anchor="middle" fill="#C7D2FE" font-family="sans-serif" font-size="10">User</text>
  <circle cx="250" cy="310" r="18" fill="#1E293B" stroke="#818CF8" stroke-width="1.5"/>
  <text x="250" y="314" text-anchor="middle" fill="#C7D2FE" font-family="sans-serif" font-size="10">User</text>
  <!-- Arrows from server to users -->
  <line x1="190" y1="140" x2="110" y2="212" stroke="#818CF8" stroke-width="1.5"/>
  <line x1="200" y1="140" x2="200" y2="252" stroke="#818CF8" stroke-width="1.5"/>
  <line x1="210" y1="140" x2="290" y2="212" stroke="#818CF8" stroke-width="1.5"/>
  <line x1="195" y1="140" x2="155" y2="292" stroke="#818CF8" stroke-width="1.5"/>
  <line x1="205" y1="140" x2="245" y2="292" stroke="#818CF8" stroke-width="1.5"/>
  <text x="200" y="370" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="11">Single point of control</text>
  <!-- Divider -->
  <line x1="400" y1="20" x2="400" y2="380" stroke="#334155" stroke-width="1" stroke-dasharray="6,4"/>
  <!-- Right: Decentralized -->
  <text x="600" y="40" text-anchor="middle" fill="#E2E8F0" font-family="sans-serif" font-size="16" font-weight="bold">Decentralized AI</text>
  <!-- Nodes -->
  <circle cx="600" cy="160" r="22" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="600" y="164" text-anchor="middle" fill="#A5F3FC" font-family="sans-serif" font-size="10">Node</text>
  <circle cx="510" cy="230" r="22" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="510" y="234" text-anchor="middle" fill="#A5F3FC" font-family="sans-serif" font-size="10">Node</text>
  <circle cx="690" cy="230" r="22" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="690" y="234" text-anchor="middle" fill="#A5F3FC" font-family="sans-serif" font-size="10">Node</text>
  <circle cx="540" cy="320" r="22" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="540" y="324" text-anchor="middle" fill="#A5F3FC" font-family="sans-serif" font-size="10">Node</text>
  <circle cx="660" cy="320" r="22" fill="#1E293B" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="660" y="324" text-anchor="middle" fill="#A5F3FC" font-family="sans-serif" font-size="10">Node</text>
  <!-- Connections -->
  <line x1="582" y1="175" x2="528" y2="213" stroke="#22D3EE" stroke-width="1" opacity="0.6"/>
  <line x1="618" y1="175" x2="672" y2="213" stroke="#22D3EE" stroke-width="1" opacity="0.6"/>
  <line x1="530" y1="245" x2="555" y2="302" stroke="#22D3EE" stroke-width="1" opacity="0.6"/>
  <line x1="670" y1="245" x2="645" y2="302" stroke="#22D3EE" stroke-width="1" opacity="0.6"/>
  <line x1="532" y1="230" x2="668" y2="230" stroke="#22D3EE" stroke-width="1" opacity="0.6"/>
  <line x1="562" y1="320" x2="638" y2="320" stroke="#22D3EE" stroke-width="1" opacity="0.6"/>
  <line x1="590" y1="178" x2="548" y2="302" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
  <line x1="610" y1="178" x2="652" y2="302" stroke="#22D3EE" stroke-width="1" opacity="0.3"/>
  <text x="600" y="370" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="11">Distributed network, no single owner</text>
</svg>