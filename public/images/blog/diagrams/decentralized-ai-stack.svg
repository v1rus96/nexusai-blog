  <text x="400" y="112" text-anchor="middle" fill="#DDD6FE" font-family="sans-serif" font-size="11">DAOs · Token Voting · Protocol Upgrades · Policy Rules</text>
  <!-- Arrow -->
  <text x="60" y="100" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="20">↑</text>
  <!-- Layer 3: Model -->
  <rect x="100" y="145" width="600" height="70" rx="8" fill="#6366F1" opacity="0.85"/>
  <text x="400" y="173" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">Model Layer</text>
  <text x="400" y="197" text-anchor="middle" fill="#C7D2FE" font-family="sans-serif" font-size="11">Bittensor · SingularityNET · Federated Learning · Model Marketplaces</text>
  <!-- Arrow -->
  <text x="60" y="185" text-anchor="middle" fill="#94A3B8" font-family="sans-serif" font-size="20">↑</text>
  <!-- Layer 2: Data -->
  <rect x="100" y="230" width="600" height="70" rx="8" fill="#0EA5E9" opacity="0.85"/>
  <text x="400" y="258" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">Data Layer</text>
  <text x="400" y="282" text-anchor="middle" fill="#BAE6FD" font-family="sans-serif" font-size="11">Ocean Protocol · Data Tokens · Privacy-Preserving Compute · IPFS</text>
