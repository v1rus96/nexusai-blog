  <text x="400" y="343" text-anchor="middle" fill="#fff" font-family="sans-serif" font-size="14" font-weight="bold">Compute Layer</text>
  <text x="400" y="367" text-anchor="middle" fill="#A5F3FC" font-family="sans-serif" font-size="11">Render Network · Akash Network · GPU Marketplaces · Distributed Training</text>
