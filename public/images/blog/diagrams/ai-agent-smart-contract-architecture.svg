<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 350" fill="none">
  <rect width="800" height="350" rx="12" fill="#0F1117"/>
  <text x="400" y="35" text-anchor="middle" fill="#E2E8F0" font-family="sans-serif" font-size="16" font-weight="bold">AI Agent + Smart Contract Architecture</text>
  <!-- User -->
  <rect x="40" y="130" width="120" height="50" rx="8" fill="#1E293B" stroke="#94A3B8" stroke-width="1.5"/>
  <text x="100" y="160" text-anchor="middle" fill="#E2E8F0" font-family="sans-serif" font-size="13">👤 User</text>
  <!-- Arrow -->
  <line x1="160" y1="155" x2="220" y2="155" stroke="#818CF8" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- AI Agent -->
  <rect x="220" y="110" width="160" height="90" rx="10" fill="#312E81" stroke="#818CF8" stroke-width="1.5"/>
  <text x="300" y="140" text-anchor="middle" fill="#A5B4FC" font-family="sans-serif" font-size="13" font-weight="bold">🤖 AI Agent</text>
  <text x="300" y="162" text-anchor="middle" fill="#C7D2FE" font-family="sans-serif" font-size="10">Observes → Decides</text>
  <text x="300" y="180" text-anchor="middle" fill="#C7D2FE" font-family="sans-serif" font-size="10">→ Acts</text>
  <!-- Arrow -->
  <line x1="380" y1="155" x2="440" y2="155" stroke="#A78BFA" stroke-width="2" marker-end="url(#arrow)"/>
  <!-- Smart Contract -->
  <rect x="440" y="110" width="160" height="90" rx="10" fill="#3B1F7E" stroke="#A78BFA" stroke-width="1.5"/>
  <text x="520" y="140" text-anchor="middle" fill="#C4B5FD" font-family="sans-serif" font-size="13" font-weight="bold">📜 Smart Contract</text>
  <text x="520" y="162" text-anchor="middle" fill="#DDD6FE" font-family="sans-serif" font-size="10">Validates → Executes</text>
  <text x="520" y="180" text-anchor="middle" fill="#DDD6FE" font-family="sans-serif" font-size="10">→ Enforces Rules</text>
  <!-- Arrow -->
  <line x1="600" y1="155" x2="660" y2="155" stroke="#22D3EE" stroke-width="2" marker-end="url(#arrow2)"/>
  <!-- Blockchain -->
  <rect x="660" y="130" width="110" height="50" rx="8" fill="#0C4A6E" stroke="#22D3EE" stroke-width="1.5"/>
  <text x="715" y="160" text-anchor="middle" fill="#A5F3FC" font-family="sans-serif" font-size="13">⛓ Blockchain</text>
  <!-- Feedback loop arrow (bottom) -->
  <path d="M 715 180 L 715 280 L 100 280 L 100 180" stroke="#4ADE80" stroke-width="1.5" fill="none" stroke-dasharray="6,4" marker-end="url(#arrow3)"/>
  <text x="400" y="300" text-anchor="middle" fill="#86EFAC" font-family="sans-serif" font-size="11">Feedback loop: results inform future decisions</text>
  <!-- Arrow markers -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#818CF8"/></marker>
    <marker id="arrow2" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#22D3EE"/></marker>
    <marker id="arrow3" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto"><path d="M0,0 L8,3 L0,6" fill="#4ADE80"/></marker>
  </defs>
</svg>