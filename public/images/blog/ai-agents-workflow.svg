<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" width="800" height="280">
  <defs>
    <linearGradient id="arrow-grad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#3B82F6" />
      <stop offset="50%" stop-color="#8B5CF6" />
      <stop offset="100%" stop-color="#06B6D4" />
    </linearGradient>
    <filter id="g1" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Stage 1: Perceive -->
  <g transform="translate(60,30)">
    <rect x="0" y="0" width="190" height="220" rx="16" fill="rgba(10,10,15,0.8)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <!-- Icon circle -->
    <circle cx="95" cy="55" r="24" fill="rgba(59,130,246,0.15)" stroke="#3B82F6" stroke-width="1.5" filter="url(#g1)" />
    <!-- Eye icon -->
    <g transform="translate(95,55)">
      <ellipse cx="0" cy="0" rx="12" ry="7" fill="none" stroke="#3B82F6" stroke-width="1.5" />
      <circle cx="0" cy="0" r="4" fill="#3B82F6" />
    </g>
    <text x="95" y="102" text-anchor="middle" fill="#E5E7EB" font-family="Inter, sans-serif" font-size="16" font-weight="600">Perceive</text>
    <!-- Sub-tasks -->
    <g fill="#9CA3AF" font-family="Inter, sans-serif" font-size="11">
      <text x="95" y="135" text-anchor="middle">Read data sources</text>
      <text x="95" y="155" text-anchor="middle">Parse context</text>
      <text x="95" y="175" text-anchor="middle">Monitor signals</text>
    </g>
    <!-- Bottom accent line -->
    <line x1="40" y1="200" x2="150" y2="200" stroke="#3B82F6" stroke-width="2" opacity="0.4" />
  </g>

  <!-- Arrow 1→2 -->
  <g transform="translate(260,130)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="url(#arrow-grad)" stroke-width="2" />
    <polygon points="50,-5 60,0 50,5" fill="#8B5CF6" />
  </g>

  <!-- Stage 2: Decide -->
  <g transform="translate(310,30)">
    <rect x="0" y="0" width="190" height="220" rx="16" fill="rgba(10,10,15,0.8)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <circle cx="95" cy="55" r="24" fill="rgba(139,92,246,0.15)" stroke="#8B5CF6" stroke-width="1.5" filter="url(#g1)" />
    <!-- Brain icon -->
    <g transform="translate(95,55)">
      <path d="M-6,-10 C-12,-10 -14,-2 -10,2 C-14,5 -10,12 -4,10 C-2,14 6,14 8,10 C14,10 14,4 10,2 C14,-2 12,-10 6,-10 C4,-14 -4,-14 -6,-10Z" fill="none" stroke="#8B5CF6" stroke-width="1.5" />
      <line x1="0" y1="-8" x2="0" y2="10" stroke="#8B5CF6" stroke-width="1" />
    </g>
    <text x="95" y="102" text-anchor="middle" fill="#E5E7EB" font-family="Inter, sans-serif" font-size="16" font-weight="600">Decide</text>
    <g fill="#9CA3AF" font-family="Inter, sans-serif" font-size="11">
      <text x="95" y="135" text-anchor="middle">Reason &amp; plan</text>
      <text x="95" y="155" text-anchor="middle">Evaluate options</text>
      <text x="95" y="175" text-anchor="middle">Select strategy</text>
    </g>
    <line x1="40" y1="200" x2="150" y2="200" stroke="#8B5CF6" stroke-width="2" opacity="0.4" />
  </g>

  <!-- Arrow 2→3 -->
  <g transform="translate(510,130)">
    <line x1="0" y1="0" x2="50" y2="0" stroke="url(#arrow-grad)" stroke-width="2" />
    <polygon points="50,-5 60,0 50,5" fill="#06B6D4" />
  </g>

  <!-- Stage 3: Act -->
  <g transform="translate(560,30)">
    <rect x="0" y="0" width="190" height="220" rx="16" fill="rgba(10,10,15,0.8)" stroke="rgba(255,255,255,0.08)" stroke-width="1" />
    <circle cx="95" cy="55" r="24" fill="rgba(6,182,212,0.15)" stroke="#06B6D4" stroke-width="1.5" filter="url(#g1)" />
    <!-- Lightning icon -->
    <g transform="translate(95,55)">
      <path d="M2,-12 L-6,2 L2,2 L-2,12 L8,0 L2,0Z" fill="#06B6D4" />
    </g>
    <text x="95" y="102" text-anchor="middle" fill="#E5E7EB" font-family="Inter, sans-serif" font-size="16" font-weight="600">Act</text>
    <g fill="#9CA3AF" font-family="Inter, sans-serif" font-size="11">
      <text x="95" y="135" text-anchor="middle">Execute tasks</text>
      <text x="95" y="155" text-anchor="middle">Call tools &amp; APIs</text>
      <text x="95" y="175" text-anchor="middle">Deliver results</text>
    </g>
    <line x1="40" y1="200" x2="150" y2="200" stroke="#06B6D4" stroke-width="2" opacity="0.4" />
  </g>
</svg>
