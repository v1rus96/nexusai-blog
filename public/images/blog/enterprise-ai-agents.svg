<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="630" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0a0a1a"/>
      <stop offset="50%" stop-color="#12112b"/>
      <stop offset="100%" stop-color="#1a0a2e"/>
    </linearGradient>
    <radialGradient id="ai" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#1d4ed8"/>
    </radialGradient>
    <linearGradient id="sys" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#06b6d4"/>
      <stop offset="100%" stop-color="#0891b2"/>
    </linearGradient>
    <linearGradient id="agent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#a78bfa"/>
      <stop offset="100%" stop-color="#7c3aed"/>
    </linearGradient>
  </defs>
  
  <rect width="1200" height="630" fill="url(#bg)"/>
  
  <!-- Circuit lines -->
  <g stroke="#3b82f6" stroke-width="2" fill="none" opacity="0.3">
    <line x1="0" y1="100" x2="400" y2="100"/>
    <line x1="500" y1="200" x2="900" y2="200"/>
    <line x1="300" y1="50" x2="300" y2="250"/>
    <line x1="600" y1="150" x2="600" y2="350"/>
    <line x1="900" y1="100" x2="900" y2="300"/>
  </g>
  
  <!-- Central AI Core -->
  <circle cx="600" cy="315" r="80" fill="url(#ai)" opacity="0.9"/>
  <circle cx="600" cy="315" r="60" fill="none" stroke="#60a5fa" stroke-width="2" opacity="0.7"/>
  
  <!-- AI pattern -->
  <g transform="translate(600,315)" stroke="#fff" stroke-width="1.5" fill="none" opacity="0.8">
    <path d="M-30,-20 Q0,-30 30,-20 Q25,0 15,15 Q0,20 -15,15 Q-25,0 -30,-20"/>
    <circle cx="-15" cy="-10" r="3" fill="#fff"/>
    <circle cx="15" cy="-10" r="3" fill="#fff"/>
  </g>
  
  <!-- Business Systems -->
  <g transform="translate(200,150)">
    <rect x="-25" y="-25" width="50" height="50" rx="8" fill="url(#sys)"/>
    <circle r="8" stroke="#fff" stroke-width="2" fill="none"/>
    <text y="45" fill="#06b6d4" text-anchor="middle" font-size="12">CRM</text>
  </g>
  
  <g transform="translate(1000,150)">
    <rect x="-25" y="-25" width="50" height="50" rx="8" fill="url(#sys)"/>
    <rect x="-12" y="-8" width="24" height="16" rx="2" stroke="#fff" stroke-width="2" fill="none"/>
    <text y="45" fill="#06b6d4" text-anchor="middle" font-size="12">ERP</text>
  </g>
  
  <g transform="translate(200,480)">
    <rect x="-25" y="-25" width="50" height="50" rx="8" fill="url(#sys)"/>
    <path d="M-10,5 L-5,-2 L0,3 L5,-5 L10,2" stroke="#fff" stroke-width="2" fill="none"/>
    <text y="45" fill="#06b6d4" text-anchor="middle" font-size="12">Analytics</text>
  </g>
  
  <g transform="translate(1000,480)">
    <rect x="-25" y="-25" width="50" height="50" rx="8" fill="url(#sys)"/>
    <ellipse cy="-8" rx="12" ry="4" stroke="#fff" stroke-width="2" fill="none"/>
    <ellipse cy="8" rx="12" ry="4" stroke="#fff" stroke-width="2" fill="none"/>
    <text y="45" fill="#06b6d4" text-anchor="middle" font-size="12">Database</text>
  </g>
  
  <!-- AI Agents -->
  <circle cx="400" cy="200" r="25" fill="url(#agent)"/>
  <circle cx="800" cy="200" r="25" fill="url(#agent)"/>
  <circle cx="400" cy="430" r="25" fill="url(#agent)"/>
  <circle cx="800" cy="430" r="25" fill="url(#agent)"/>
  
  <!-- Connections -->
  <g stroke="#8b5cf6" stroke-width="2" fill="none" opacity="0.6">
    <line x1="600" y1="315" x2="400" y2="200"/>
    <line x1="600" y1="315" x2="800" y2="200"/>
    <line x1="600" y1="315" x2="400" y2="430"/>
    <line x1="600" y1="315" x2="800" y2="430"/>
    <line x1="400" y1="200" x2="200" y2="150"/>
    <line x1="800" y1="200" x2="1000" y2="150"/>
    <line x1="400" y1="430" x2="200" y2="480"/>
    <line x1="800" y1="430" x2="1000" y2="480"/>
  </g>
  
  <!-- Data particles -->
  <g fill="#60a5fa" opacity="0.7">
    <circle cx="300" cy="175" r="3"/>
    <circle cx="700" cy="250" r="3"/>
    <circle cx="500" cy="380" r="3"/>
    <circle cx="900" cy="455" r="3"/>
  </g>
</svg>