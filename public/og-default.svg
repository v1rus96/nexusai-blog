<svg width="1200" height="630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1e3a5f;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#2563eb;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#7c3aed;stop-opacity:1" />
    </linearGradient>
    <pattern id="dots" x="0" y="0" width="40" height="40" patternUnits="userSpaceOnUse">
      <circle cx="20" cy="20" r="1.5" fill="rgba(255,255,255,0.1)" />
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#bg)" />
  <rect width="1200" height="630" fill="url(#dots)" />
  
  <!-- Decorative circles -->
  <circle cx="1050" cy="120" r="180" fill="rgba(255,255,255,0.05)" />
  <circle cx="150" cy="530" r="120" fill="rgba(255,255,255,0.05)" />
  
  <!-- Title -->
  <text x="80" y="260" font-family="system-ui, -apple-system, sans-serif" font-size="72" font-weight="bold" fill="white">NexusAI Blog</text>
  
  <!-- Subtitle -->
  <text x="80" y="340" font-family="system-ui, -apple-system, sans-serif" font-size="36" fill="rgba(255,255,255,0.8)">Where AI Meets Blockchain</text>
  
  <!-- Tagline -->
  <text x="80" y="420" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">Exploring the frontier of artificial intelligence</text>
  <text x="80" y="455" font-family="system-ui, -apple-system, sans-serif" font-size="24" fill="rgba(255,255,255,0.6)">and blockchain technology</text>
  
  <!-- Bottom accent line -->
  <rect x="80" y="520" width="200" height="4" rx="2" fill="rgba(255,255,255,0.4)" />
</svg>