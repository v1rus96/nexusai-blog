name: Lighthouse CI

on:
  pull_request:
    branches: [main]

jobs:
  lighthouse:
    name: Lighthouse Performance Audit
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build application
        run: npm run build
        env:
          SKIP_ENV_VALIDATION: true

      - name: Run Lighthouse CI
        uses: treosh/lighthouse-ci-action@v11
        with:
          configPath: './.github/lighthouse/lighthouserc.json'
          temporaryPublicStorage: true
          runs: 3
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

      - name: Comment PR with results
        uses: actions/github-script@v7
        if: github.event_name == 'pull_request'
        with:
          script: |
            const fs = require('fs');
            
            // Read Lighthouse results
            const resultsPath = './lhci_reports/manifest.json';
            if (!fs.existsSync(resultsPath)) {
              console.log('No Lighthouse results found');
              return;
            }
            
            const manifest = JSON.parse(fs.readFileSync(resultsPath, 'utf8'));
            const summary = manifest[0].summary;
            
            const comment = `## ⚡ Lighthouse Performance Report
            
            | Metric | Score | Status |
            |--------|-------|--------|
            | Performance | ${summary.performance || 'N/A'} | ${summary.performance >= 90 ? '✅' : summary.performance >= 75 ? '⚠️' : '❌'} |
            | Accessibility | ${summary.accessibility || 'N/A'} | ${summary.accessibility >= 90 ? '✅' : '❌'} |
            | Best Practices | ${summary['best-practices'] || 'N/A'} | ${summary['best-practices'] >= 90 ? '✅' : '❌'} |
            | SEO | ${summary.seo || 'N/A'} | ${summary.seo >= 90 ? '✅' : '❌'} |
            
            ### Performance Budget
            - ✅ LCP < 2.5s
            - ✅ CLS < 0.1
            - ✅ FID < 100ms
            
            [View detailed report](${process.env.LHCI_BUILD_URL})
            `;
            
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: comment
            });