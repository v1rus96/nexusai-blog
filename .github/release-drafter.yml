name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'

categories:
  - title: '✨ Features'
    labels:
      - 'type:feature'
      - 'type:enhancement'
    collapse-after: 10
  - title: '🐛 Bug Fixes'
    labels:
      - 'type:bug'
      - 'type:fix'
    collapse-after: 10
  - title: '📚 Documentation'
    labels:
      - 'area:docs'
      - 'type:docs'
  - title: '🏗️ Infrastructure'
    labels:
      - 'area:ci-cd'
      - 'area:config'
  - title: '🔄 Dependencies'
    labels:
      - 'dependencies'
      - 'area:deps'
    collapse-after: 3
  - title: '🧹 Maintenance'
    labels:
      - 'type:chore'
      - 'type:refactor'

change-template: '- $TITLE by @$AUTHOR (#$NUMBER)'

change-title-escapes: '\<*_&@#'

version-resolver:
  major:
    labels:
      - 'type:breaking'
      - 'breaking-change'
  minor:
    labels:
      - 'type:feature'
      - 'type:enhancement'
  patch:
    labels:
      - 'type:bug'
      - 'type:fix'
      - 'type:docs'
      - 'type:chore'
  default: patch

template: |
  ## What's Changed

  $CHANGES

  ## Statistics
  
  **Full Changelog**: https://github.com/$OWNER/$REPOSITORY/compare/$PREVIOUS_TAG...v$RESOLVED_VERSION
  
  ---
  
  *This release was automatically generated by [Release Drafter](https://github.com/release-drafter/release-drafter)*

autolabeler:
  - label: 'area:frontend'
    files:
      - 'src/components/**/*'
      - 'src/app/**/*'
      - 'src/styles/**/*'
      - 'public/**/*'
  
  - label: 'area:backend'
    files:
      - 'src/lib/**/*'
      - 'src/utils/**/*'
      - 'scripts/**/*'
      
  - label: 'area:content'
    files:
      - 'content/**/*'
      - '**/*.md'
      - '**/*.mdx'
      
  - label: 'area:config'
    files:
      - '*.config.*'
      - 'package.json'
      - 'package-lock.json'
      - 'tsconfig.json'
      
  - label: 'area:ci-cd'
    files:
      - '.github/**/*'
      - '.vercel/**/*'
      
  - label: 'dependencies'
    files:
      - 'package.json'
      - 'package-lock.json'

exclude-labels:
  - 'skip-changelog'
  - 'invalid'
  - 'duplicate'
  - 'wontfix'

include-pre-releases: false